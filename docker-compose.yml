services:
  notebook:
    image: docker.io/jupyter/pyspark-notebook:latest
    ports:
      - 8888:8888
    volumes:
      - .:/home/user/work:z
    working_dir: /home/user/work
    environment:
      - KAGGLE_USERNAME=${KAGGLE_USERNAME}
      - KAGGLE_KEY=${KAGGLE_KEY}
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
